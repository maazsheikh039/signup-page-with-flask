<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style-index.css') }}">

    <style>
        /* Navbar fix hone ki wajah se body ko thora niche dhakelnay ke liye */
        body {
            padding-top: 70px;
            /* Navbar ki height ke mutabiq */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Puri screen ki height */
        }

        /* Content wala hissa sari khali jagah le lega taake footer niche rahe */
        .main-content {
            flex: 1;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Navbar fixed hai, isliye scroll thora niche rukna chahiye */
        #about-section, #project-section, #contact-section {
            scroll-margin-top: 80px;
        }
    </style>
</head>

<body>

    {% include 'components/navbar.html' %}

    <div class="main-content">
        <div class="container mt-4">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% include 'components/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
