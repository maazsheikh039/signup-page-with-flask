{% extends 'base.html' %}

{% block title %}Signup | Maaz App{% endblock %}

{% block content %}
<center>
    <h1 style="margin-top: 50px;">Welcome Back</h1>

    <div class="signup-card">
        <form method="post" action="{{ url_for('login') }}">
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="maaz@example.com" required>
                </div>

                <div class="col-md-12 mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label">Password</label>
                        <a href="#" name="password" style="font-size: 0.85rem; text-decoration: none; color: #6c757d;">Forgot?</a>
                    </div>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-signup">Login to Account</button>
            </div>
        </form>

        <div class="text-center login-link" style="margin-top: 20px;">
            Don't have an account? <a href="{{ url_for('signup') }}">Signup here</a>
        </div>
    </div>
</center>
{% endblock %}
