{% extends 'base.html' %}

{% block title %}Signup | Maaz App{% endblock %}

{% block content %}
    <center>
        <h1 class="mt-4">Create Account</h1>

        <div class="signup-card">
            <form method="post" action="{{ url_for('signup') }}">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="fullname" placeholder="Maaz Ghufran" required>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" placeholder="maaz@example.com" required>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Qualification</label>
                        <select class="form-select" name="qualification">
                            <option selected disabled>Choose...</option>
                            <option value="matric">Matric / O-Levels</option>
                            <option value="intermediate">Intermediate / A-Levels</option>
                            <option value="graduate">Graduate</option>
                            <option value="postgraduate">Post Graduate</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Specialization</label>
                        <input type="text" class="form-control" name="myeducation" placeholder="Computer Science">
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-signup">Create My Account</button>
                </div>
            </form>

            <div class="text-center login-link">
                Already have an account? <a href="{{ url_for('login') }}">Login here</a>
            </div>
        </div>
    </center>
{% endblock %}
